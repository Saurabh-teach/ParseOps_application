openapi: 3.0.3
info:
  title: ParseOps API
  version: 1.0.0
  description: API documentation for ParseOps project
paths:
  /api/analytics/org/{org_id}/:
    get:
      operationId: analytics_org_retrieve
      description: Returns user-wise or team-wise analytics based on the user's role
        in the organization.
      summary: Get Dashboard Analytics
      parameters:
      - in: path
        name: org_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - analytics
      security:
      - jwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsResponse'
          description: ''
  /api/comments/{comment_id}/:
    put:
      operationId: comments_update
      description: Edit the comment text. Sets is_edited=True and updates mentions.
      parameters:
      - in: path
        name: comment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - comments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CommentUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CommentUpdateRequest'
        required: true
      security:
      - jwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentList'
          description: ''
    delete:
      operationId: comments_destroy
      description: Soft delete a comment.
      parameters:
      - in: path
        name: comment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - comments
      security:
      - jwtAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/comments/{comment_id}/reply/:
    post:
      operationId: comments_reply_create
      description: Reply to a specific comment. Detects @mentions.
      parameters:
      - in: path
        name: comment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
