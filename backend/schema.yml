components:
  schemas:
    AnalyticsResponse:
      type: object
      properties:
        role:
          type: string
        total_tasks:
          type: integer
        completed_tasks:
          type: integer
        overdue_tasks:
          type: integer
        in_progress_tasks:
          type: integer
        efficiency:
          type: integer
        goals_involved:
          type: integer
        overall_total_tasks:
          type: integer
        overall_completed_tasks:
          type: integer
        overall_efficiency:
          type: integer
        total_goals:
          type: integer
        member_stats:
          type: array
          items:
            type: object
            additionalProperties: {}
      required:
      - role
    ChangePasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
        new_password:
          type: string
          minLength: 1
      required:
      - email
      - new_password
    ChatParticipant:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        role:
          $ref: '#/components/schemas/RoleEnum'
        joined_at:
          type: string
          format: date-time
          readOnly: true
        last_read_message:
          type: string
          format: uuid
          nullable: true
        last_read_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - id
      - joined_at
      - last_read_at
      - user
    ChatParticipantRequest:
      type: object
      properties:
        role:
          $ref: '#/components/schemas/RoleEnum'
        last_read_message:
          type: string
          format: uuid
          nullable: true
    ChatRoom:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        organization:
          type: string
          format: uuid
        room_type:
          $ref: '#/components/schemas/RoomTypeEnum'
        name:
          type: string
          readOnly: true
        description:
          type: string
          nullable: true
        created_by:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        participants:
          type: array
          items:
            $ref: '#/components/schemas/ChatParticipant'
          readOnly: true
        latest_message:
          type: string
          readOnly: true
        unread_count:
          type: string
          readOnly: true
      required:
      - created_at
      - id
      - latest_message
      - name
      - organization
      - participants
      - room_type
      - unread_count
      - updated_at
    ChatRoomRequest:
      type: object
      properties:
        organization:
          type: string
          format: uuid
        room_type:
          $ref: '#/components/schemas/RoomTypeEnum'
        description:
          type: string
          nullable: true
        created_by:
          type: string
          format: uuid
          nullable: true
      required:
      - organization
      - room_type
    CommentCreateRequest:
      type: object
      description: Serializer for creating a Task Comment or threaded reply.
      properties:
        parent:
          type: string
          format: uuid
          nullable: true
        comment:
          type: string
          minLength: 1
        attachment_ids:
          type: array
          items:
            type: string
            format: uuid
          writeOnly: true
      required:
      - comment
    CommentList:
      type: object
      description: Explicit alias for listing task comments with replies.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        task:
          type: string
          format: uuid
          readOnly: true
        user:
          type: string
          format: uuid
          readOnly: true
        user_id:
          type: string
          format: uuid
          readOnly: true
        user_name:
          type: string
          readOnly: true
        user_email:
          type: string
          format: email
          readOnly: true
        user_avatar:
          type: string
          nullable: true
          readOnly: true
        parent:
          type: string
          format: uuid
          nullable: true
        comment:
          type: string
        mentions:
          type: array
          items:
            type: string
            format: uuid
        mentions_details:
          type: array
          items: {}
          readOnly: true
        is_edited:
          type: boolean
          readOnly: true
        is_deleted:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        replies:
          type: array
          items: {}
          readOnly: true
        attachments:
          type: array
          items: {}
          readOnly: true
      required:
      - attachments
      - comment
      - created_at
      - id
      - is_deleted
      - is_edited
      - mentions_details
      - replies
      - task
      - updated_at
      - user
      - user_avatar
      - user_email
      - user_id
      - user_name
    CommentUpdateRequest:
      type: object
      description: Serializer for updating comment body text.
      properties:
        comment:
          type: string
          minLength: 1
      required:
      - comment
    DashboardApp:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
        icon:
          type: string
          maxLength: 50
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
      - slug
    DashboardAppRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        slug:
          type: string
          minLength: 1
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
        icon:
          type: string
          minLength: 1
          maxLength: 50
        is_active:
          type: boolean
      required:
      - name
      - slug
    EmailRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
      required:
      - email
    GoalCreateUpdate:
